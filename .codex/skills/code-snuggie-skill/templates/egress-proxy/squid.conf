acl SSL_ports port 443
acl Safe_ports port 80 443
acl CONNECT method CONNECT

http_port 3128

# Starter allowlist for generated AI-agent-facing Codespaces.
#
# Keep this file repo-specific when adapting the template:
# - Keep package-manager, GitHub, VS Code/OpenAI, and certificate hosts that
#   validation and first-open setup need.
# - Add project-specific domains only after validation proves they are needed.
# - Avoid parent/subdomain duplicates in a single ACL. Squid rejects entries
#   such as `auth.openai.com` and `.auth.openai.com` in the same ACL.
# - Prefer small ACL groups over one giant ACL when a parent and a subdomain
#   both need to be present for validation or documentation.
acl allowed_domains dstdomain \
  github.com \
  api.github.com \
  .githubusercontent.com \
  registry.npmjs.org \
  pypi.org \
  files.pythonhosted.org \
  marketplace.visualstudio.com \
  update.code.visualstudio.com \
  api.openai.com \
  chatgpt.com \
  auth.openai.com \
  .oaiusercontent.com

acl openai_subdomains dstdomain \
  .openai.com \
  .chatgpt.com

acl openai_auth_domains dstdomain \
  .auth.openai.com

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow allowed_domains
http_access allow openai_subdomains
http_access allow openai_auth_domains
http_access deny all

access_log stdio:/var/log/squid/access.log
